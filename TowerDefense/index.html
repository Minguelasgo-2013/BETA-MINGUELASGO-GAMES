var WAYPOINTS = [[0,1],[14,1],[14,3],[1,3],[1,5],[14,5],[14,7],[1,7],[1,9],[14,9]];
var pathCells = {};

function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playTone(freq, dur, type, vol, delay) {
    if (!audioCtx) return;
    var t = audioCtx.currentTime + (delay || 0);
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol || 0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
}
function sndPlace() { playTone(350, 0.08, 'sine', 0.08); playTone(500, 0.1, 'sine', 0.06, 0.05); }

function buildPath() {
    pathCells = {};
    enemyPath = [];
    for (var w = 0; w < WAYPOINTS.length - 1; w++) {
        var ax = WAYPOINTS[w][0], ay = WAYPOINTS[w][1];
        var bx = WAYPOINTS[w+1][0], by = WAYPOINTS[w+1][1];
        var dx = Math.sign(bx - ax), dy = Math.sign(by - ay);
        var x = ax, y = ay;
        while (true) {
            pathCells[x+','+y] = true;
            var dup = false;
            if (enemyPath.length > 0) {
                var last = enemyPath[enemyPath.length-1];
                if (last[0] === x && last[1] === y) dup = true;
            }
            if (!dup) enemyPath.push([x, y]);
            if (x === bx && y === by) break;
            x += dx; y += dy;
        }
    }
    pathSegLengths = [];
    totalPathLen = 0;
    for (var i = 0; i < enemyPath.length - 1; i++) {
        var ddx = enemyPath[i+1][0] - enemyPath[i][0];
        var ddy = enemyPath[i+1][1] - enemyPath[i][1];
        var len = Math.sqrt(ddx*ddx + ddy*ddy);
        pathSegLengths.push(len);
        totalPathLen += len;
    }
}

function isPathCell(col, row) { return pathCells[col+','+row] === true; }
function isValidPlacement(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
    if (isPathCell(col, row)) return false;
    for (var i = 0; i < game.towers.length; i++) {
        if (game.towers[i].col === col && game.towers[i].row === row) return false;
    }
    return true;
}

function cellToPixel(col, row) {
    return { x: offsetX + col * cellSize + cellSize / 2, y: offsetY + row * cellSize + cellSize / 2 };
}
function pixelToCell(px, py) {
    var col = Math.floor((px - offsetX) / cellSize);
    var row = Math.floor((py - offsetY) / cellSize);
    return { col: col, row: row };
}

function getEnemyPos(e) {
    var idx = Math.min(e.pathIdx, enemyPath.length - 2);
    var p1 = enemyPath[idx];
    var p2 = enemyPath[Math.min(idx + 1, enemyPath.length - 1)];
    var t = e.pathT;
    return cellToPixel(p1[0] + (p2[0] - p1[0]) * t, p1[1] + (p2[1] - p1[1]) * t);
}

function getEnemyDist(e) {
    var d = 0;
    for (var i = 0; i < e.pathIdx && i < pathSegLengths.length; i++) d += pathSegLengths[i];
    if (e.pathIdx < pathSegLengths.length) d += pathSegLengths[e.pathIdx] * e.pathT;
    return d;
}

function spawnEnemy(type) {
    var base = ENEMIES[type];
    var hpMult = 1 + game.currentWave * 0.15;
    var spdMult = 1 + game.currentWave * 0.02;
    var e = {
        type: type,
        hp: Math.round(base.hp * hpMult),
        maxHp: Math.round(base.hp * hpMult),
        speed: base.speed * spdMult,
        armor: base.armor,
        reward: base.reward + Math.floor(game.currentWave * 2),
        flying: base.flying || false,
        healRate: base.healRate || 0,
        size: base.size,
        pathIdx: 0,
        pathT: 0,
        x: 0, y: 0,
        slowMult: 1,
        slowTimer: 0,
        burnDmg: 0,
        burnTimer: 0,
        alive: true,
        flashTimer: 0,
        spawnAnim: 1.0
    };
    var pos = getEnemyPos(e);
    e.x = pos.x; e.y = pos.y;
    game.enemies.push(e);
}

function damageEnemy(enemy, damage, tower) {
    var armor = enemy.armor;
    if (tower && tower.type === 'sniper' && tower.level >= 3) armor = Math.floor(armor * 0.5);
    var actualDmg = Math.max(1, damage - armor);
    var crit = Math.random() < 0.1;
    if (crit) actualDmg = Math.round(actualDmg * 2);
    enemy.hp -= actualDmg;
    enemy.flashTimer = 0.1;
    if (tower) tower.totalDmg += actualDmg;
    var pos = getEnemyPos(enemy);
    addFloatingText(pos.x, pos.y - cellSize * enemy.size, (crit ? 'CRIT! ' : '') + actualDmg, crit ? '#ffd700' : '#fff');
    if (enemy.hp <= 0) {
        enemy.alive = false;
        game.gold += enemy.reward;
        game.score += enemy.reward;
        game.totalKills++;
        if (tower) tower.kills++;
        addParticles(pos.x, pos.y, ENEMIES[enemy.type].color, 12, 80);
        addFloatingText(pos.x, pos.y, '+' + enemy.reward + 'g', '#ffd700');
        sndDie();
    }
    if (tower && tower.type === 'ice') {
        var lvl = tower.level - 1;
        var slowAmt = TOWERS.ice.slow[lvl];
        var slowDur = TOWERS.ice.slowDur[lvl];
        if (!enemy.flying) {
            enemy.slowMult = 1 - slowAmt;
            enemy.slowTimer = slowDur;
        }
        if (tower.level >= 3 && !enemy.flying && Math.random() < 0.2) {
            enemy.slowMult = 0;
            enemy.slowTimer = 0.5;
        }
    }
    if (tower && tower.type === 'fire') {
        var lvl2 = tower.level - 1;
        enemy.burnDmg = TOWERS.fire.burn[lvl2];
        enemy.burnTimer = TOWERS.fire.burnDur[lvl2];
    }
}

function updateEnemies(dt) {
    for (var i = game.enemies.length - 1; i >= 0; i--) {
        var e = game.enemies[i];
        if (!e.alive) { game.enemies.splice(i, 1); continue; }
        e.spawnAnim = Math.max(0, e.spawnAnim - dt * 3);
        if (e.slowTimer > 0) {
            e.slowTimer -= dt;
            if (e.slowTimer <= 0) { e.slowMult = 1; e.slowTimer = 0; }
        }
        if (e.burnTimer > 0) {
            e.burnTimer -= dt;
            e.hp -= e.burnDmg * dt;
            if (Math.random() < 0.3) {
                var pos0 = getEnemyPos(e);
                addParticles(pos0.x + (Math.random()-0.5)*8, pos0.y + (Math.random()-0.5)*8, '#ff6600', 1, 30);
            }
            if (e.hp <= 0 && e.alive) {
                e.alive = false;
                game.gold += e.reward;
                game.score += e.reward;
                game.totalKills++;
                var pos1 = getEnemyPos(e);
                addParticles(pos1.x, pos1.y, ENEMIES[e.type].color, 10, 70);
                addFloatingText(pos1.x, pos1.y, '+' + e.reward + 'g', '#ffd700');
                sndDie();
            }
            if (e.burnTimer <= 0) { e.burnDmg = 0; e.burnTimer = 0; }
        }
        if (e.flashTimer > 0) e.flashTimer -= dt;
        if (e.healRate > 0) {
            for (var j = 0; j < game.enemies.length; j++) {
                var other = game.enemies[j];
                if (other === e || !other.alive) continue;
                var ePos = getEnemyPos(e);
                var oPos = getEnemyPos(other);
                var hdx = oPos.x - ePos.x, hdy = oPos.y - ePos.y;
                var hDist = Math.sqrt(hdx*hdx + hdy*hdy);
                if (hDist < cellSize * 2.5) {
                    other.hp = Math.min(other.maxHp, other.hp + e.healRate * dt);
                }
            }
        }
        var moveSpeed = e.speed * e.slowMult;
        e.pathT += moveSpeed * dt;
        while (e.pathT >= 1 && e.pathIdx < enemyPath.length - 2) {
            e.pathT -= 1;
            e.pathIdx++;
        }
        if (e.pathIdx >= enemyPath.length - 2 && e.pathT >= 1) {
            e.alive = false;
            game.lives--;
            sndLoseLife();
            game.enemies.splice(i, 1);
            if (game.lives <= 0) { endGame(false); return; }
            continue;
        }
        var pos2 = getEnemyPos(e);
        e.x = pos2.x; e.y = pos2.y;
    }
}

function placeTower(type, col, row) {
    var td = TOWERS[type];
    if (game.gold < td.cost) return false;
    if (!isValidPlacement(col, row)) return false;
    game.gold -= td.cost;
    var t = {
        type: type, col: col, row: row,
        level: 1, cooldown: 0,
        targeting: 'first',
        kills: 0, totalDmg: 0,
        totalCost: td.cost,
        placeAnim: 1.0
    };
    var px = cellToPixel(col, row);
    t.x = px.x; t.y = px.y;
    game.towers.push(t);
    game.towersPlaced++;
    addParticles(t.x, t.y, td.color, 8, 50);
    sndPlace();
    return true;
}

function getTowerStat(tower, stat) {
    var td = TOWERS[tower.type];
    var arr = td[stat];
    if (!arr) return 0;
    return arr[tower.level - 1];
}

function findTarget(tower) {
    var td = TOWERS[tower.type];
    var range = getTowerStat(tower, 'range') * cellSize;
    var candidates = [];
    for (var i = 0; i < game.enemies.length; i++) {
        var e = game.enemies[i];
        if (!e.alive) continue;
        var dx = e.x - tower.x, dy = e.y - tower.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist <= range) {
            candidates.push({ enemy: e, dist: dist, pathDist: getEnemyDist(e) });
        }
    }
    if (candidates.length === 0) return null;
    var mode = tower.targeting;
    if (mode === 'first') {
        candidates.sort(function(a,b) { return b.pathDist - a.pathDist; });
    } else if (mode === 'last') {
        candidates.sort(function(a,b) { return a.pathDist - b.pathDist; });
    } else if (mode === 'strong') {
        candidates.sort(function(a,b) { return b.enemy.hp - a.enemy.hp; });
    } else {
        candidates.sort(function(a,b) { return a.dist - b.dist; });
    }
    return candidates[0].enemy;
}

function towerShoot(tower, target) {
    var td = TOWERS[tower.type];
    var dmg = getTowerStat(tower, 'dmg');
    if (td.chain) {
        var chainCount = td.chain[tower.level - 1];
        var hit = [target];
        damageEnemy(target, dmg, tower);
        var last = target;
        for (var c = 0; c < chainCount; c++) {
            var best = null, bestDist = cellSize * 3;
            for (var j = 0; j < game.enemies.length; j++) {
                var e = game.enemies[j];
                if (!e.alive || hit.indexOf(e) !== -1) continue;
                var cdx = e.x - last.x, cdy = e.y - last.y;
                var cd = Math.sqrt(cdx*cdx + cdy*cdy);
                if (cd < bestDist) { bestDist = cd; best = e; }
            }
            if (!best) break;
            game.lightnings.push({ x1: last.x, y1: last.y, x2: best.x, y2: best.y, life: 0.2 });
            damageEnemy(best, Math.round(dmg * 0.7), tower);
            hit.push(best);
            last = best;
        }
        game.lightnings.push({ x1: tower.x, y1: tower.y, x2: target.x, y2: target.y, life: 0.2 });
        sndShoot();
    } else {
        var proj = {
            x: tower.x, y: tower.y,
            tx: target.x, ty: target.y,
            target: target,
            speed: td.projSpeed * cellSize,
            dmg: dmg,
            tower: tower,
            type: tower.type,
            color: td.projColor,
            size: td.projSize,
            alive: true
        };
        if (td.splash) proj.splash = td.splash[tower.level - 1] * cellSize;
        game.projectiles.push(proj);
        sndShoot();
    }
    if (tower.type === 'archer' && tower.level >= 3) {
        var proj2 = {
            x: tower.x, y: tower.y,
            tx: target.x + (Math.random()-0.5)*10, ty: target.y + (Math.random()-0.5)*10,
            target: target,
            speed: td.projSpeed * cellSize * 0.9,
            dmg: Math.round(dmg * 0.5),
            tower: tower,
            type: tower.type,
            color: td.projColor,
            size: 2,
            alive: true
        };
        game.projectiles.push(proj2);
    }
}

function updateTowers(dt) {
    for (var i = 0; i < game.towers.length; i++) {
        var t = game.towers[i];
        t.placeAnim = Math.max(0, t.placeAnim - dt * 4);
        if (t.cooldown > 0) { t.cooldown -= dt; continue; }
        var target = findTarget(t);
        if (target) {
            towerShoot(t, target);
            t.cooldown = getTowerStat(t, 'rate');
        }
    }
}

function updateProjectiles(dt) {
    for (var i = game.projectiles.length - 1; i >= 0; i--) {
        var p = game.projectiles[i];
        if (!p.alive) { game.projectiles.splice(i, 1); continue; }
        if (p.target && p.target.alive) {
            p.tx = p.target.x; p.ty = p.target.y;
        }
        var dx = p.tx - p.x, dy = p.ty - p.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        var move = p.speed * dt;
        if (dist <= move || dist < 5) {
            if (p.splash) {
                for (var j = 0; j < game.enemies.length; j++) {
                    var e = game.enemies[j];
                    if (!e.alive) continue;
                    var sdx = e.x - p.tx, sdy = e.y - p.ty;
                    if (Math.sqrt(sdx*sdx + sdy*sdy) <= p.splash) {
                        damageEnemy(e, p.dmg, p.tower);
                    }
                }
                addParticles(p.tx, p.ty, p.color, 10, 60);
                sndExplosion();
            } else {
                if (p.target && p.target.alive) {
                    damageEnemy(p.target, p.dmg, p.tower);
                }
            }
            p.alive = false;
            game.projectiles.splice(i, 1);
        } else {
            p.x += (dx / dist) * move;
            p.y += (dy / dist) * move;
        }
    }
}

function updateLightnings(dt) {
    for (var i = game.lightnings.length - 1; i >= 0; i--) {
        game.lightnings[i].life -= dt;
        if (game.lightnings[i].life <= 0) game.lightnings.splice(i, 1);
    }
}

var particles = [];
var floatingTexts = [];
var MAX_PARTICLES = 300;
var MAX_TEXTS = 60;

function addParticles(x, y, color, count, speed) {
    for (var i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) particles.shift();
        var angle = Math.random() * Math.PI * 2;
        var spd = (speed || 60) * (0.3 + Math.random() * 0.7);
        particles.push({ x:x, y:y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:0.4+Math.random()*0.4, maxLife:0.8, color:color, size:1.5+Math.random()*2.5 });
    }
}
function addFloatingText(x, y, text, color) {
    if (floatingTexts.length >= MAX_TEXTS) floatingTexts.shift();
    floatingTexts.push({ x:x, y:y, text:String(text), color:color, life:0.9, vy:-45 });
}
function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.95; p.vy *= 0.95;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (var j = floatingTexts.length - 1; j >= 0; j--) {
        var ft = floatingTexts[j];
        ft.y += ft.vy * dt;
        ft.life -= dt;
        if (ft.life <= 0) floatingTexts.splice(j, 1);
    }
}

function startWave() {
    if (!game || game.waveActive) return;
    if (game.currentWave >= WAVE_DEFS.length) return;
    game.waveActive = true;
    game.waveSpawns = [];
    var def = WAVE_DEFS[game.currentWave];
    var hasBoss = false;
    for (var i = 0; i < def.length; i++) {
        game.waveSpawns.push({ type: def[i].t, remaining: def[i].c, interval: def[i].i, timer: def[i].i * 0.5 });
        if (def[i].t === 'boss') hasBoss = true;
    }
    if (hasBoss) sndBoss();
    else sndWaveStart();
    showWaveBanner();
    document.getElementById('waveBtn').disabled = true;
}

function showWaveBanner() {
    var banner = document.getElementById('waveBanner');
    var title = document.getElementById('wbTitle');
    var emojis = document.getElementById('wbEnemies');
    title.textContent = 'OLEADA ' + (game.currentWave + 1);
    var def = WAVE_DEFS[game.currentWave];
    var emojiStr = '';
    for (var i = 0; i < def.length; i++) {
        var et = ENEMIES[def[i].t];
        for (var j = 0; j < Math.min(def[i].c, 8); j++) emojiStr += et.emoji;
        if (def[i].c > 8) emojiStr += '...';
        emojiStr += ' ';
    }
    emojis.textContent = emojiStr.trim();
    banner.style.opacity = '1';
    setTimeout(function() { banner.style.opacity = '0'; }, 2000);
}

function updateWaveSpawns(dt) {
    if (!game.waveActive) return;
    var allDone = true;
    for (var i = 0; i < game.waveSpawns.length; i++) {
        var s = game.waveSpawns[i];
        if (s.remaining <= 0) continue;
        allDone = false;
        s.timer -= dt;
        if (s.timer <= 0) {
            spawnEnemy(s.type);
            s.remaining--;
            s.timer = s.interval;
        }
    }
    if (allDone && game.enemies.length === 0) {
        waveComplete();
    }
}

function waveComplete() {
    game.waveActive = false;
    var bonus = 50 + game.currentWave * 10;
    var interest = Math.min(50, Math.floor(game.gold * 0.05));
    game.gold += bonus + interest;
    game.score += bonus;
    addFloatingText(W/2, H/2, '+' + bonus + 'g bonus +' + interest + 'g interes', '#ffd700');
    game.currentWave++;
    if (game.currentWave >= WAVE_DEFS.length) {
        endGame(true);
        return;
    }
    document.getElementById('waveBtn').disabled = false;
    updateShopState();
}

function drawGrid() {
    for (var row = 0; row < ROWS; row++) {
        for (var col = 0; col < COLS; col++) {
            var x = offsetX + col * cellSize;
            var y = offsetY + row * cellSize;
            if (isPathCell(col, row)) {
                ctx.fillStyle = '#2a2a4a';
                ctx.fillRect(x, y, cellSize, cellSize);
                ctx.strokeStyle = 'rgba(60,60,100,0.3)';
                ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
            } else {
                ctx.fillStyle = '#1a1a35';
                ctx.fillRect(x, y, cellSize, cellSize);
                ctx.strokeStyle = 'rgba(50,50,80,0.2)';
                ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
            }
        }
    }
    ctx.strokeStyle = 'rgba(102,126,234,0.15)';
    ctx.lineWidth = 2;
    for (var p = 0; p < enemyPath.length - 1; p++) {
        var a = cellToPixel(enemyPath[p][0], enemyPath[p][1]);
        var b = cellToPixel(enemyPath[p+1][0], enemyPath[p+1][1]);
        if (p === 0) { ctx.beginPath(); ctx.moveTo(a.x, a.y); }
        ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
    ctx.lineWidth = 1;
    var entry = cellToPixel(enemyPath[0][0], enemyPath[0][1]);
    ctx.fillStyle = '#00c853';
    ctx.font = Math.round(cellSize * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('IN', entry.x, entry.y);
    var exit = cellToPixel(enemyPath[enemyPath.length-1][0], enemyPath[enemyPath.length-1][1]);
    ctx.fillStyle = '#ff4466';
    ctx.fillText('END', exit.x, exit.y);
}

function drawHoverPreview() {
    if (!selectedTower || !hoverCell) return;
    var col = hoverCell.col, row = hoverCell.row;
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
    var valid = isValidPlacement(col, row);
    var x = offsetX + col * cellSize;
    var y = offsetY + row * cellSize;
    ctx.fillStyle = valid ? 'rgba(0,200,83,0.2)' : 'rgba(255,68,102,0.2)';
    ctx.fillRect(x, y, cellSize, cellSize);
    ctx.strokeStyle = valid ? 'rgba(0,200,83,0.5)' : 'rgba(255,68,102,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, cellSize, cellSize);
    ctx.lineWidth = 1;
    if (valid) {
        var td = TOWERS[selectedTower];
        var cx = x + cellSize / 2, cy = y + cellSize / 2;
        var range = td.range[0] * cellSize;
        ctx.beginPath();
        ctx.arc(cx, cy, range, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(102,126,234,0.08)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(102,126,234,0.25)';
        ctx.stroke();
        ctx.font = Math.round(cellSize * 0.55) + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(td.emoji, cx, cy);
    }
}

function drawTowers() {
    for (var i = 0; i < game.towers.length; i++) {
        var t = game.towers[i];
        var td = TOWERS[t.type];
        var x = t.x, y = t.y;
        var r = cellSize * 0.38;
        var scale = 1 + t.placeAnim * 0.3;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        if (selectedPlaced === t) {
            var range = getTowerStat(t, 'range') * cellSize;
            ctx.beginPath();
            ctx.arc(0, 0, range / scale, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(102,126,234,0.08)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(102,126,234,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.lineWidth = 1;
        }
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = td.color;
        ctx.globalAlpha = 0.3;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = td.color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.font = Math.round(cellSize * 0.5) + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(td.emoji, 0, 0);
        if (t.level >= 2) {
            var starY = r + 4;
            ctx.font = Math.round(cellSize * 0.18) + 'px sans-serif';
            ctx.fillStyle = '#ffd700';
            var stars = '';
            for (var s = 0; s < t.level; s++) stars += '★';
            ctx.fillText(stars, 0, starY);
        }
        if (t.cooldown > 0) {
            var maxCd = getTowerStat(t, 'rate');
            var cdPct = t.cooldown / maxCd;
            ctx.beginPath();
            ctx.arc(0, 0, r + 2, -Math.PI/2, -Math.PI/2 + (1-cdPct) * Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.lineWidth = 1;
        }
        ctx.restore();
    }
}

function drawEnemies() {
    for (var i = 0; i < game.enemies.length; i++) {
        var e = game.enemies[i];
        if (!e.alive) continue;
        var x = e.x, y = e.y;
        var r = cellSize * e.size;
        var scale = 1 + e.spawnAnim * 0.5;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.globalAlpha = 1 - e.spawnAnim * 0.5;
        if (e.type === 'boss') {
            var pulse = 0.7 + Math.sin(Date.now() * 0.005) * 0.3;
            ctx.beginPath();
            ctx.arc(0, 0, r + 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(155,89,182,' + (pulse * 0.2) + ')';
            ctx.fill();
        }
        if (e.healRate > 0) {
            var healPulse = 0.5 + Math.sin(Date.now() * 0.008) * 0.5;
            ctx.beginPath();
            ctx.arc(0, 0, r + 8, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(46,204,113,' + (healPulse * 0.4) + ')';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.lineWidth = 1;
        }
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        var baseColor = ENEMIES[e.type].color;
        if (e.flashTimer > 0) baseColor = '#ffffff';
        else if (e.slowMult < 1) baseColor = '#4fc3f7';
        ctx.fillStyle = baseColor;
        ctx.globalAlpha *= 0.5;
        ctx.fill();
        ctx.globalAlpha = 1 - e.spawnAnim * 0.5;
        ctx.strokeStyle = baseColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.lineWidth = 1;
        var eSize = Math.round(cellSize * (e.size * 1.3));
        ctx.font = eSize + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ENEMIES[e.type].emoji, 0, 0);
        if (e.flying) {
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.font = Math.round(eSize * 0.6) + 'px serif';
            ctx.fillText('\u{1F4A8}', -r, r * 0.5);
            ctx.restore();
        }
        var hpPct = e.hp / e.maxHp;
        var barW = r * 2.2;
        var barH = 3;
        var barY = -r - 6;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(-barW/2, barY, barW, barH);
        var hpColor = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336';
        ctx.fillStyle = hpColor;
        ctx.fillRect(-barW/2, barY, barW * Math.max(0, hpPct), barH);
        if (e.armor > 0) {
            ctx.font = Math.round(cellSize * 0.15) + 'px sans-serif';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'right';
            ctx.fillText('\u{1F6E1}' + e.armor, barW/2, barY - 2);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }
}

function drawProjectiles() {
    for (var i = 0; i < game.projectiles.length; i++) {
        var p = game.projectiles[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.fill();
    }
    ctx.shadowBlur = 0;
    for (var j = 0; j < game.lightnings.length; j++) {
        var l = game.lightnings[j];
        ctx.save();
        ctx.globalAlpha = l.life / 0.2;
        ctx.strokeStyle = '#ffeb3b';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ffeb3b';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(l.x1, l.y1);
        var segs = 4;
        for (var s = 1; s <= segs; s++) {
            var t = s / segs;
            var lx = l.x1 + (l.x2 - l.x1) * t + (s < segs ? (Math.random()-0.5) * 12 : 0);
            var ly = l.y1 + (l.y2 - l.y1) * t + (s < segs ? (Math.random()-0.5) * 12 : 0);
            ctx.lineTo(lx, ly);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    for (var j = 0; j < floatingTexts.length; j++) {
        var ft = floatingTexts[j];
        ctx.globalAlpha = Math.max(0, ft.life / 0.9);
        ctx.fillStyle = ft.color;
        ctx.font = 'bold ' + Math.round(cellSize * 0.28) + 'px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;
}

function drawDecorations() {
    var decorSeeds = [3,7,0,5,15,2,8,12,6,1,14,4,11,9,13,10];
    var decIdx = 0;
    for (var row = 0; row < ROWS; row++) {
        for (var col = 0; col < COLS; col++) {
            if (isPathCell(col, row)) continue;
            var hasTower = false;
            for (var t = 0; t < game.towers.length; t++) {
                if (game.towers[t].col === col && game.towers[t].row === row) { hasTower = true; break; }
            }
            if (hasTower) continue;
            var seed = (col * 7 + row * 13 + 5) % 23;
            if (seed < 3) {
                var px = cellToPixel(col, row);
                ctx.globalAlpha = 0.15;
                ctx.font = Math.round(cellSize * 0.3) + 'px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                var deco = seed === 0 ? '\u{1F332}' : seed === 1 ? '\u{1FAA8}' : '\u{1F33F}';
                ctx.fillText(deco, px.x, px.y);
                ctx.globalAlpha = 1;
            }
        }
    }
}

function draw() {
    ctx.fillStyle = '#12122a';
    ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawDecorations();
    drawHoverPreview();
    drawTowers();
    drawEnemies();
    drawProjectiles();
    drawParticles();
}

function updateHUD() {
    document.getElementById('hudLives').textContent = game.lives;
    document.getElementById('hudGold').textContent = game.gold;
    document.getElementById('hudWave').textContent = (game.currentWave + (game.waveActive ? 1 : 0)) + '/25';
    document.getElementById('hudScore').textContent = game.score;
}

function updateShopState() {
    var btns = document.querySelectorAll('.tbtn');
    for (var i = 0; i < btns.length; i++) {
        var type = btns[i].getAttribute('data-type');
        if (type && TOWERS[type]) {
            if (game.gold < TOWERS[type].cost) btns[i].classList.add('noGold');
            else btns[i].classList.remove('noGold');
        }
    }
}

function buildShop() {
    var shop = document.getElementById('shop');
    var html = '';
    for (var i = 0; i < TOWER_ORDER.length; i++) {
        var key = TOWER_ORDER[i];
        var td = TOWERS[key];
        html += '<button class="tbtn" data-type="' + key + '" onclick="selectTower(\'' + key + '\')" title="' + td.name + ' - ' + td.desc + '">';
        html += '<span class="te">' + td.emoji + '</span>';
        html += '<span class="tn">' + td.name + '</span>';
        html += '<span class="tc">' + td.cost + 'g</span>';
        html += '</button>';
    }
    html += '<button id="speedBtn" onclick="toggleSpeed()">1x</button>';
    html += '<button id="waveBtn" onclick="startWave()">\u{25B6} OLEADA</button>';
    shop.innerHTML = html;
}

function selectTower(type) {
    closeTowerInfo();
    if (selectedTower === type) {
        selectedTower = null;
        updateShopSelection();
        return;
    }
    selectedTower = type;
    selectedPlaced = null;
    updateShopSelection();
}

function updateShopSelection() {
    var btns = document.querySelectorAll('.tbtn');
    for (var i = 0; i < btns.length; i++) {
        var t = btns[i].getAttribute('data-type');
        if (t === selectedTower) btns[i].classList.add('sel');
        else btns[i].classList.remove('sel');
    }
}

function showTowerInfo(tower) {
    selectedPlaced = tower;
    selectedTower = null;
    updateShopSelection();
    var td = TOWERS[tower.type];
    var lvl = tower.level;
    document.getElementById('tiEmoji').textContent = td.emoji;
    document.getElementById('tiName').textContent = td.name;
    var stars = '';
    for (var s = 0; s < lvl; s++) stars += '★';
    for (var s2 = lvl; s2 < 3; s2++) stars += '☆';
    document.getElementById('tiLevel').textContent = 'Nivel ' + lvl + ' ' + stars;
    var statsHtml = '';
    statsHtml += '<div class="ti-stat"><label>Dano</label><span>' + getTowerStat(tower,'dmg');
    if (lvl < 3) statsHtml += ' <span class="up">→ ' + td.dmg[lvl] + '</span>';
    statsHtml += '</span></div>';
    statsHtml += '<div class="ti-stat"><label>Alcance</label><span>' + getTowerStat(tower,'range').toFixed(1);
    if (lvl < 3) statsHtml += ' <span class="up">→ ' + td.range[lvl].toFixed(1) + '</span>';
    statsHtml += '</span></div>';
    statsHtml += '<div class="ti-stat"><label>Velocidad</label><span>' + getTowerStat(tower,'rate').toFixed(2) + 's';
    if (lvl < 3) statsHtml += ' <span class="up">→ ' + td.rate[lvl].toFixed(2) + 's</span>';
    statsHtml += '</span></div>';
    if (td.splash) statsHtml += '<div class="ti-stat"><label>Splash</label><span>' + td.splash[lvl-1].toFixed(1) + '</span></div>';
    if (td.chain) statsHtml += '<div class="ti-stat"><label>Cadena</label><span>' + td.chain[lvl-1] + ' objetivos</span></div>';
    if (td.slow) statsHtml += '<div class="ti-stat"><label>Slow</label><span>' + Math.round(td.slow[lvl-1]*100) + '% / ' + td.slowDur[lvl-1] + 's</span></div>';
    if (td.burn) statsHtml += '<div class="ti-stat"><label>Quemadura</label><span>' + td.burn[lvl-1] + '/s x ' + td.burnDur[lvl-1] + 's</span></div>';
    document.getElementById('tiStats').innerHTML = statsHtml;
    var upgBtn = document.getElementById('tiUpgrade');
    if (lvl >= 3) {
        upgBtn.textContent = 'MAX';
        upgBtn.disabled = true;
    } else {
        var upgCost = td.upgCost[lvl - 1];
        upgBtn.textContent = 'Mejorar (' + upgCost + 'g)';
        upgBtn.disabled = game.gold < upgCost;
    }
    var sellVal = Math.floor(tower.totalCost * 0.6);
    document.getElementById('tiSell').textContent = 'Vender (' + sellVal + 'g)';
    var targetModes = ['first','last','strong','close'];
    var targetLabels = ['Primero','Ultimo','Fuerte','Cerca'];
    var tgtHtml = '';
    for (var ti = 0; ti < targetModes.length; ti++) {
        tgtHtml += '<button class="ti-tgt' + (tower.targeting === targetModes[ti] ? ' act' : '') + '" onclick="setTargeting(\'' + targetModes[ti] + '\')">' + targetLabels[ti] + '</button>';
    }
    document.getElementById('tiTargets').innerHTML = tgtHtml;
    document.getElementById('tiKills').textContent = tower.kills + ' kills | ' + tower.totalDmg + ' dano total';
    document.getElementById('towerInfo').classList.add('show');
}

function closeTowerInfo() {
    document.getElementById('towerInfo').classList.remove('show');
    selectedPlaced = null;
}

function upgradeTower() {
    if (!selectedPlaced) return;
    var t = selectedPlaced;
    var td = TOWERS[t.type];
    if (t.level >= 3) return;
    var cost = td.upgCost[t.level - 1];
    if (game.gold < cost) return;
    game.gold -= cost;
    t.level++;
    t.totalCost += cost;
    addParticles(t.x, t.y, '#ffd700', 12, 60);
    sndUpgrade();
    showTowerInfo(t);
    updateShopState();
}

function sellTower(tow) {
    var t = tow || selectedPlaced;
    if (!t) return;
    var sellVal = Math.floor(t.totalCost * 0.6);
    game.gold += sellVal;
    addFloatingText(t.x, t.y, '+' + sellVal + 'g', '#ffd700');
    addParticles(t.x, t.y, '#ffd700', 8, 50);
    sndSell();
    var idx = game.towers.indexOf(t);
    if (idx !== -1) game.towers.splice(idx, 1);
    closeTowerInfo();
    updateShopState();
}

function setTargeting(mode) {
    if (!selectedPlaced) return;
    selectedPlaced.targeting = mode;
    showTowerInfo(selectedPlaced);
}

function toggleSpeed() {
    gameSpeed = gameSpeed === 1 ? 2 : 1;
    var btn = document.getElementById('speedBtn');
    btn.textContent = gameSpeed + 'x';
    if (gameSpeed === 2) btn.classList.add('fast');
    else btn.classList.remove('fast');
}

function handleCanvasClick(px, py) {
    var cell = pixelToCell(px, py);
    if (cell.col < 0 || cell.col >= COLS || cell.row < 0 || cell.row >= ROWS) {
        closeTowerInfo();
        return;
    }
    for (var i = 0; i < game.towers.length; i++) {
        if (game.towers[i].col === cell.col && game.towers[i].row === cell.row) {
            selectedTower = null;
            updateShopSelection();
            showTowerInfo(game.towers[i]);
            return;
        }
    }
    if (selectedTower) {
        if (placeTower(selectedTower, cell.col, cell.row)) {
            updateShopState();
            if (game.gold < TOWERS[selectedTower].cost) {
                selectedTower = null;
                updateShopSelection();
            }
        }
        return;
    }
    closeTowerInfo();
}

canvas.addEventListener('click', function(e) {
    initAudio();
    var rect = canvas.getBoundingClientRect();
    handleCanvasClick(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    hoverCell = pixelToCell(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('mouseleave', function() {
    hoverCell = null;
});

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    initAudio();
    var touch = e.touches[0];
    var rect = canvas.getBoundingClientRect();
    hoverCell = pixelToCell(touch.clientX - rect.left, touch.clientY - rect.top);
    handleCanvasClick(touch.clientX - rect.left, touch.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    var rect = canvas.getBoundingClientRect();
    hoverCell = pixelToCell(touch.clientX - rect.left, touch.clientY - rect.top);
}, { passive: false });

document.addEventListener('keydown', function(e) {
    if (!gameStarted || !game) return;
    var key = e.key;
    if (key >= '1' && key <= '6') {
        var idx = parseInt(key) - 1;
        if (idx < TOWER_ORDER.length) selectTower(TOWER_ORDER[idx]);
    }
    if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        if (!game.waveActive) startWave();
    }
    if (key === 'Escape') {
        selectedTower = null;
        updateShopSelection();
        closeTowerInfo();
    }
    if (key === 's' || key === 'S') {
        if (selectedPlaced) sellTower();
    }
    if (key === 'u' || key === 'U') {
        if (selectedPlaced) upgradeTower();
    }
});

function resize() {
    W = canvas.width = canvas.clientWidth;
    H = canvas.height = canvas.clientHeight;
    var cellW = Math.floor(W / COLS);
    var cellH = Math.floor(H / ROWS);
    cellSize = Math.min(cellW, cellH);
    offsetX = Math.floor((W - cellSize * COLS) / 2);
    offsetY = Math.floor((H - cellSize * ROWS) / 2);
    if (game) {
        for (var i = 0; i < game.towers.length; i++) {
            var t = game.towers[i];
            var px = cellToPixel(t.col, t.row);
            t.x = px.x; t.y = px.y;
        }
    }
}

function startGame() {
    document.getElementById('overlay').classList.add('hidden');
    gameStarted = true;
    gameSpeed = 1;
    var sb = document.getElementById('speedBtn');
    if (sb) { sb.textContent = '1x'; sb.classList.remove('fast'); }
    selectedTower = null;
    selectedPlaced = null;
    hoverCell = null;
    particles = [];
    floatingTexts = [];
    game = {
        towers: [], enemies: [], projectiles: [], lightnings: [],
        gold: 200, lives: 20, score: 0,
        currentWave: 0, waveActive: false, waveSpawns: [],
        totalKills: 0, towersPlaced: 0,
        running: true, victory: false
    };
    buildPath();
    resize();
    buildShop();
    updateShopState();
    document.getElementById('waveBtn').disabled = false;
    updateHUD();
    if (!animId) gameLoop(0);
}

function endGame(victory) {
    game.running = false;
    game.victory = victory;
    var best = parseInt(localStorage.getItem('mg_td_best') || '0');
    var bestWave = parseInt(localStorage.getItem('mg_td_wave') || '0');
    var games = parseInt(localStorage.getItem('mg_td_games') || '0');
    if (game.score > best) localStorage.setItem('mg_td_best', game.score);
    var finalWave = game.currentWave + (victory ? 0 : 1);
    if (finalWave > bestWave) localStorage.setItem('mg_td_wave', finalWave);
    localStorage.setItem('mg_td_games', games + 1);
    if (victory) sndVictory();
    else sndGameOver();
    setTimeout(function() {
        var ov = document.getElementById('overlay');
        ov.classList.remove('hidden');
        var newBest = game.score > best;
        ov.innerHTML = '<h2>' + (victory ? '\u{1F3C6} VICTORIA!' : 'GAME OVER') + '</h2>' +
            '<p class="sub">' + (victory ? 'Has defendido las 25 oleadas!' : 'Tu base ha sido destruida') + '</p>' +
            '<div class="bigstat">' + game.score + '</div>' +
            (newBest ? '<p style="color:#ffd700;font-size:0.9em;margin-bottom:8px">\u{2B50} NUEVO RECORD!</p>' : '') +
            '<div class="statrow">Oleada alcanzada: ' + finalWave + '/25</div>' +
            '<div class="statrow">Enemigos eliminados: ' + game.totalKills + '</div>' +
            '<div class="statrow">Torres colocadas: ' + game.towersPlaced + '</div>' +
            '<div class="statrow" style="color:#7070a0;margin-top:6px">Record: ' + Math.max(best, game.score) + ' | Mejor oleada: ' + Math.max(bestWave, finalWave) + '</div>' +
            '<button class="play-btn" onclick="startGame()">REINTENTAR</button>' +
            '<a href="beta.html" style="display:inline-block;margin-top:12px;color:#667eea;font-size:0.85em">Volver a la plataforma</a>';
    }, victory ? 500 : 1500);
}

var lastTime = 0;
function gameLoop(timestamp) {
    var rawDt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (rawDt > 0.15) rawDt = 0.15;
    var dt = rawDt * gameSpeed;
    if (game && game.running) {
        updateWaveSpawns(dt);
        updateEnemies(dt);
        updateTowers(dt);
        updateProjectiles(dt);
        updateLightnings(dt);
        updateParticles(dt);
        updateHUD();
        if (game.running) {
            var goldChanged = false;
            var btns = document.querySelectorAll('.tbtn');
            for (var i = 0; i < btns.length; i++) {
                var tp = btns[i].getAttribute('data-type');
                if (tp && TOWERS[tp]) {
                    var hasGold = game.gold >= TOWERS[tp].cost;
                    if (hasGold && btns[i].classList.contains('noGold')) { btns[i].classList.remove('noGold'); goldChanged = true; }
                    else if (!hasGold && !btns[i].classList.contains('noGold')) { btns[i].classList.add('noGold'); goldChanged = true; }
                }
            }
        }
    }
    draw();
    animId = requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', function() {
    resize();
});
resize();
buildShop();
</script>

<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="theme-color" content="#ffffff">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo h1 {
            font-size: 1.8em;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }

        .login-logo .beta-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.85em;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            color: #1a1a1a;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-group input:focus {
            border-color: #1a1a1a;
            background: #ffffff;
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .login-btn {
            margin-top: 8px;
            padding: 14px;
            background: #1a1a1a;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background: #333;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-msg {
            text-align: center;
            font-size: 0.85em;
            color: #e53935;
            min-height: 20px;
            margin-top: 4px;
        }

        .footer-text {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8em;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>MINGUELASGO GAMES</h1>
            <span class="beta-badge">Beta Privada</span>
        </div>

        <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
            <div class="input-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" placeholder="Tu nombre de beta tester" autocomplete="off" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Contraseña de acceso" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Entrar a la Beta</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <p class="footer-text">&copy; 2026 MINGUELASGO GAMES</p>
    </div>

    <script>
    // PERMANENTE - tu cuenta principal (nunca se gasta)
    var BETA_USERS = [
        '26b64b2b8a4d186cdbeb03a4db0599db0781e1ce5c44885d263f832c53c024b1'
    ];

    // DESECHABLES - cada una funciona solo 1 vez (linea 170-174)
    var DISPOSABLE_USERS = [
        'e7fd1732c3383a35dfe70cb273243b9b15013d278b663ac70212ddefe66325e5',
        'f7523820e9e52bcbb2fea32b6593470426ea0a4f0eabfa633551e4e547ffe959',
        'abdefd215c710738a1bbace555f378c83953fefc8bd1454baf75731751b0e7bd',
        '959ba26158986deb64689bd230627676bd066cfccc796f12b17a21568291ff34',
        'b829091b786090f947ffa3eef9fe442488b90ad2160fc30d3bef1b5c8dd64522'
    ];

    var SECRET_KEY = 'mG2026xR9kLz';
    var failCount = 0;

    function getUsedKeys() { return JSON.parse(localStorage.getItem('mg_used_keys') || '[]'); }
    function markUsed(hash) { var used = getUsedKeys(); used.push(hash); localStorage.setItem('mg_used_keys', JSON.stringify(used)); }

    async function sha256(text) {
        var encoder = new TextEncoder();
        var data = encoder.encode(text);
        var hashBuffer = await crypto.subtle.digest('SHA-256', data);
        var hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    async function generateToken(user) {
        return await sha256(SECRET_KEY + ':' + user + ':' + SECRET_KEY);
    }

    window.generateHash = async function(user, pass) {
        var hash = await sha256(user.toLowerCase() + ':' + pass);
        console.log("'" + hash + "',");
        return hash;
    };

    (async function() {
        var token = sessionStorage.getItem('beta_token');
        var user = sessionStorage.getItem('beta_user');
        if (token && user) {
            var valid = await generateToken(user);
            if (token === valid) {
                window.location.href = atob('YmV0YS5odG1s');
            }
        }
    })();

    async function handleLogin(e) {
        e.preventDefault();
        var user = document.getElementById('username').value.trim().toLowerCase();
        var pass = document.getElementById('password').value;
        var errorEl = document.getElementById('errorMsg');
        var btn = document.getElementById('loginBtn');

        errorEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Verificando...';

        var delay = Math.min(failCount * 1000, 5000);
        await new Promise(function(r) { setTimeout(r, delay); });

        var hash = await sha256(user + ':' + pass);
        var isPermanent = BETA_USERS.indexOf(hash) !== -1;
        var isDisposable = DISPOSABLE_USERS.indexOf(hash) !== -1;
        var used = getUsedKeys();

        if (isDisposable && used.indexOf(hash) !== -1) {
            failCount++;
            errorEl.textContent = 'Esta clave ya fue usada';
            btn.disabled = false;
            btn.textContent = 'Entrar a la Beta';
            return false;
        }

        if (isPermanent || isDisposable) {
            failCount = 0;
            if (isDisposable) markUsed(hash);
            var token = await generateToken(user);
            sessionStorage.setItem('beta_token', token);
            sessionStorage.setItem('beta_user', user);
            btn.textContent = 'Acceso concedido';
            btn.style.background = '#4caf50';
            setTimeout(function() {
                window.location.href = atob('YmV0YS5odG1s');
            }, 500);
        } else {
            failCount++;
            errorEl.textContent = 'Usuario o contraseña incorrectos' + (failCount >= 3 ? ' (espera ' + Math.min(failCount, 5) + 's)' : '');
            btn.disabled = false;
            btn.textContent = 'Entrar a la Beta';
        }

        return false;
    }
    </script>
</body>
</html>
